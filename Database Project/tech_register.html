<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>TechForge - Access Portal</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
      }

      header {
        background-color: #2c3e50;
        color: white;
        padding: 25px;
        text-align: center;
        border-bottom: 5px solid #e74c3c;
      }
      header h1 {
        color: #e74c3c;
        margin: 0;
        font-size: 2.5em;
        text-transform: uppercase;
      }

      /* Container for the Home button outside the white box */
      .top-nav {
        text-align: center;
        margin-top: 20px;
      }

      /* Home Button - Now matches the Login button style */
      .btn-home {
        display: inline-block;
        background-color: #e74c3c;
        color: white;
        padding: 12px 25px;
        text-decoration: none;
        font-weight: bold;
        border-radius: 6px;
        transition:
          background 0.3s,
          transform 0.2s;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .btn-home:hover {
        background-color: #c0392b;
        transform: translateY(-2px);
      }

      .auth-container {
        width: 450px;
        margin: 20px auto 40px auto;
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 25px;
        border-bottom: 2px solid #f4f4f4;
        padding-bottom: 10px;
      }

      .input-group {
        margin-bottom: 20px;
      }
      .input-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #34495e;
      }

      input[type="text"],
      input[type="password"],
      select {
        width: 100%;
        padding: 12px;
        border: 2px solid #dcdde1;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 16px;
      }
      input:focus {
        border-color: #e74c3c;
        outline: none;
      }

      .btn {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 6px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
        margin-top: 10px;
      }
      .btn-login {
        background-color: #e74c3c;
        color: white;
      }
      .btn-login:hover {
        background-color: #c0392b;
      }

      .btn-register {
        background-color: #2c3e50;
        color: white;
      }
      .btn-register:hover {
        background-color: #1a252f;
      }

      hr {
        margin: 40px 0;
        border: 0;
        border-top: 1px solid #eee;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>TechForge</h1>
      <p>Precision Crafted Performance Systems</p>
    </header>

    <div class="top-nav">
      <a href="index.htm" class="btn-home">&larr; BACK TO HOMEPAGE</a>
    </div>

    <div class="auth-container">
      <h2>Secure Login</h2>
      <form action="usertable.php" method="post">
        <div class="input-group">
          <label>Email Address</label>
          <input
            type="text"
            name="email"
            required
            placeholder="user@email.com"
          />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input
            type="password"
            name="password"
            required
            placeholder="Enter password"
          />
        </div>

        <div class="input-group">
          <label>Account Type</label>
          <select name="type">
            <option value="user">Customer</option>
            <option value="admin">Administrator</option>
          </select>
        </div>

        <button type="submit" class="btn btn-login">Login to Portal</button>
      </form>

      <hr />

      <h2>Create Account</h2>
      <form action="tech_register.php" method="post">
        <div class="input-group">
          <label>First Name</label>
          <input type="text" name="firstname" required />
        </div>
        <div class="input-group">
          <label>Last Name</label>
          <input type="text" name="lastname" required />
        </div>
        <div class="input-group">
          <label>Email</label>
          <input type="text" name="email" required />
        </div>
        <div class="input-group">
          <label>Phone Number</label>
          <input type="text" name="phone" required />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" name="password" required />
        </div>
        <button type="submit" class="btn btn-register">Register Account</button>
      </form>
    </div>
  </body>
</html>
